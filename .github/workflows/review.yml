name: Hound Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Download modules
        run: go mod download

      - name: Run Hound Review
        id: review
        run: |
          set -euo pipefail

          # Get base ref safely (handle detached head or missing origin)
          BASE_REF="${{ github.base_ref }}"
          if ! git rev-parse "origin/$BASE_REF" &>/dev/null; then
            BASE_REF="master"
          fi

          # Get changed Go files (non-test)
          CHANGED_FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD -- '*.go' 2>/dev/null | grep -v '_test.go' || echo "")

          # Initialize review output
          REVIEW_OUTPUT="## ­¤ÉĢ Hound Code Review\n\n"
          REVIEW_OUTPUT+="**Pull Request:** #${{ github.event.pull_request.number }}\n\n"
          REVIEW_OUTPUT+="**Go Version:** $(go version)\n\n"

          ISSUES_FOUND=false

          # --- Security Checks on changed files only ---
          if [[ -n "$CHANGED_FILES" ]]; then
            # Shell=True risk (Shell=true in exec is dangerous)
            SHELL_TRUE=$(echo "$CHANGED_FILES" | xargs grep -rn 'Shell[[:space:]]*[:=][[:space:]]*true' 2>/dev/null || true)
            if [[ -n "$SHELL_TRUE" ]]; then
              ISSUES_FOUND=true
              REVIEW_OUTPUT+="ŌÜĀ’ĖÅ **Shell=True Risk** ŌĆö \`Shell=true\` enables shell interpretation:\n\n"
              REVIEW_OUTPUT+="\`\`\`\n$SHELL_TRUE\n\`\`\`\n\n"
            fi

            # Template injection in os/exec (data-dependent command construction)
            # Look for patterns like: exec.Command(..., userInput) where userInput isn't validated
            TEMPLATE_INJECT=$(echo "$CHANGED_FILES" | xargs grep -rn 'exec\.Command(' 2>/dev/null | grep -v '_test.go' | grep -v 'shellJoin\|fieldQuote' || true)
            if [[ -n "$TEMPLATE_INJECT" ]]; then
              # Only flag if there's string concat or template in the args
              TEMPLATE_CONCAT=$(echo "$TEMPLATE_INJECT" | grep -E '\+ |fmt\.Sprintf|`|\$\{?' 2>/dev/null || true)
              if [[ -n "$TEMPLATE_CONCAT" ]]; then
                ISSUES_FOUND=true
                REVIEW_OUTPUT+="ŌÜĀ’ĖÅ **Potential Shell Injection** ŌĆö \`exec.Command\` with dynamic string building:\n\n"
                REVIEW_OUTPUT+="\`\`\`\n$TEMPLATE_CONCAT\n\`\`\`\n\n"
              fi
            fi
          fi

          # --- Go vet ---
          if ! go vet ./... 2>&1; then
            ISSUES_FOUND=true
            VET_OUTPUT=$(go vet ./... 2>&1)
            REVIEW_OUTPUT+="ŌÜĀ’ĖÅ **Go Vet Warnings:**\n\`\`\`\n$VET_OUTPUT\n\`\`\`\n\n"
          fi

          # --- Build ---
          BUILD_OUTPUT=""
          if ! go build -o /dev/null ./cmd/gurl 2>&1; then
            ISSUES_FOUND=true
            BUILD_OUTPUT=$(go build -o /dev/null ./cmd/gurl 2>&1)
            REVIEW_OUTPUT+="ŌØī **Build Failed:**\n\`\`\`\n$BUILD_OUTPUT\n\`\`\`\n\n"
          fi

          # --- Tests ---
          TEST_OUTPUT=""
          if ! go test ./... 2>&1; then
            ISSUES_FOUND=true
            TEST_OUTPUT=$(go test ./... 2>&1)
            REVIEW_OUTPUT+="ŌØī **Tests Failed:**\n\`\`\`\n$TEST_OUTPUT\n\`\`\`\n\n"
          fi

          # Compile final review
          if $ISSUES_FOUND; then
            REVIEW_OUTPUT+="### ­¤ö┤ Issues Found\n\nSee above for details.\n"
          else
            REVIEW_OUTPUT+="### ­¤¤ó No Issues Found\n\nHound found no security, build, vet, or test issues.\n"
          fi

          echo "review<<EOF" >> $GITHUB_OUTPUT
          printf '%s' "$REVIEW_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Post Review Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            
            const body = `## ­¤ÉĢ Hound Code Review
              
**Files changed:** ${context.payload.pull_request.changed_files}
              
${review || 'No issues found.'}
            `;
            
            // Get existing comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            // Delete old Hound comments
            for (const comment of comments.data) {
              if (comment.user.login === 'github-actions[bot]' && comment.body.includes('­¤ÉĢ Hound')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            }
            
            // Post new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
