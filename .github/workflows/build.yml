name: Build

on:
  push:
    tags: ['v*']
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        go: ['1.21', '1.22', '1.23']
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          name="gurl-${{ matrix.os }}-${{ matrix.arch }}${ext}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "$name" ./cmd/gurl
      
      - name: Checksum
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            sha256sum gurl-*.exe > SHA256SUMS
          else
            sha256sum gurl-* > SHA256SUMS
          fi
      
      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gurl-*
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
