name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            go: '1.22'
          - os: ubuntu-latest
            arch: arm64
            go: '1.22'
          - os: macos-latest
            arch: arm64
            go: '1.22'
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false
      
      - name: Download modules
        run: go mod download || true
      
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          name="gurl-${{ matrix.arch }}${ext}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "$name" ./cmd/gurl
          echo "$name" > artifact_name.txt
      
      - name: Checksum
        run: |
          name=$(cat artifact_name.txt)
          sha256sum "$name" > SHA256SUMS
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/$(cat artifact_name.txt)
          asset_name: $(cat artifact_name.txt)
          asset_content_type: application/octet-stream
      
      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ github.workspace }}/SHA256SUMS
          asset_name: SHA256SUMS
          asset_content_type: text/plain
