name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Download modules
        run: go mod download || true

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          case "${{ matrix.os }}" in
            macos-latest) os_name="darwin" ;;
            ubuntu-latest) os_name="linux" ;;
            windows-latest) os_name="windows" ;;
            *) os_name="${{ matrix.os }}" ;;
          esac
          name="gurl-${os_name}-${{ matrix.arch }}${ext}"
          go build -ldflags="-s -w -X main.version=${VERSION} -X github.com/sreeram/gurl/internal/cli/commands.CurrentVersion=${VERSION}" -o "$name" ./cmd/gurl

      - name: Checksum
        run: |
          case "${{ matrix.os }}" in
            macos-latest) os_name="darwin" ;;
            ubuntu-latest) os_name="linux" ;;
            windows-latest) os_name="windows" ;;
            *) os_name="${{ matrix.os }}" ;;
          esac
          name="gurl-${os_name}-${{ matrix.arch }}"
          sha256sum "$name" > SHA256SUMS
          tar -czf "${name}.tar.gz" "$name"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gurl-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            gurl-*
            SHA256SUMS
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          pattern: gurl-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gurl-*
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
