name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-latest
            arch: arm64
          - os: macos-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Download modules
        run: go mod download || true

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          name="gurl-${{ matrix.arch }}${ext}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "$name" ./cmd/gurl

      - name: Checksum
        run: |
          name=$(ls gurl-* | head -1)
          sha256sum "$name" > SHA256SUMS

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gurl-*
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
