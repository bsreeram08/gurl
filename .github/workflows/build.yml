name: Build

on:
  push:
    tags: ['v*']
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            go: '1.22'
          - os: ubuntu-latest
            arch: arm64
            go: '1.22'
          - os: macos-latest
            arch: arm64
            go: '1.22'
          - os: windows-latest
            arch: amd64
            go: '1.22'
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: false
      
      - name: Download modules
        run: |
          go mod download || true
      
      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          name="gurl-${{ matrix.os }}-${{ matrix.arch }}${ext}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "$name" ./cmd/gurl
      
      - name: Checksum
        run: |
          name=$(ls gurl-* | head -1)
          if command -v sha256sum &>/dev/null; then
            sha256sum "$name" > SHA256SUMS
          elif command -v shasum &>/dev/null; then
            shasum -a 256 "$name" > SHA256SUMS
          elif command -v certutil &>/dev/null; then
            certutil -hashfile "$name" SHA256 | grep -v ":" | tr -d '\n ' > SHA256SUMS
            echo "" >> SHA256SUMS
            echo " $name" >> SHA256SUMS
          fi
          cat SHA256SUMS || true
      
      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            gurl-*
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
