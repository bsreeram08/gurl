baseURL = 'https://bsreeram08.github.io/gurl/'
languageCode = 'en-us'
title = 'Gurl CLI'
theme = 'PaperMod'

[params]
description = "curl for the AI era — secure, logged, and agent-friendly"
author = "Sreeram"
defaultTheme = "dark"
ShowReadingTime = false
ShowShareButtons = false
ShowPostNavLinks = false
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false

[params.homeInfoParams]
Title = "Gurl"
Content = """
**curl for the AI era.**

Give AI agents a secure, observable tool for HTTP — credentials stay out of context, every request is logged, collections are easily configurable.
Works just as well for humans at the terminal.
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/bsreeram08/gurl"

[params.assets]
favicon = "/favicon.ico"

[markup]
[markup.highlight]
style = "dracula"
lineNos = false
codeFences = true

