baseURL = 'https://bsreeram08.github.io/gurl/'
languageCode = 'en-us'
title = 'Gurl CLI'
theme = 'PaperMod'

[params]
description = "The terminal-first API client. Like Postman, for your terminal."
author = "Sreeram"
defaultTheme = "dark"
ShowReadingTime = false
ShowShareButtons = false
ShowPostNavLinks = false
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false

[params.homeInfoParams]
Title = "Gurl CLI"
Content = """
**The terminal-first API client.**

Save, run, and manage API requests from your terminal.
9 auth handlers, 4 protocols, scripting, assertions, collection runner, TUI, and plugin system.
Works great with AI agents — they never touch your credentials.
"""

[[params.socialIcons]]
name = "github"
url = "https://github.com/bsreeram08/gurl"

[params.assets]
favicon = "/favicon.ico"

[markup]
[markup.highlight]
style = "dracula"
lineNos = false
codeFences = true

